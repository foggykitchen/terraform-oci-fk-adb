title: "FoggyKitchen Autonomous Database Serverless with Terraform - LESSON 12 - Creating Autonomous DB Serverless with the ECPU Compute Model."
description: "This lesson explores Autonomous Database Serverless using the ECPU compute model, private endpoint networking, and autoscaling options."
stackDescription: "This lesson explores Autonomous Database Serverless using the ECPU compute model, private endpoint networking, and autoscaling options."
schemaVersion: 1.1.0
version: "20201028"
locale: "en"

variableGroups:
- title: "General Configuration"
  visible: false
  variables:
  - tenancy_ocid
  - region

- title: "Required Configuration"
  visible: true
  variables:
  - compartment_ocid
  - adb_password

variables:

  # General Configuration
  tenancy_ocid:
    title: "Tenancy ID"
    description: "The Oracle Cloud Identifier (OCID) for your OCI tenancy"
    type: string
    required: true
    visibile: false

  region:
    title: "Region"
    description: "Choose region for your OCI Autonomous Database Serverless deployment"
    type: oci:identity:region:name
    required: true
    visibile: true

  adb_password:
    title: "ADB ADMIN Password"
    description: "Specify the password for OCI Autonomous Database Serverless ADMIN user"
    type: password
    minLength: 12
    maxLength: 30
    pattern: ^[A-Za-z][A-Za-z0-9_#\$]+$
    required: true
    visibile: true

  compartment_ocid:
    title: "Compartment"
    description: "Choose compartment for OCI Autonomous Database Serverless"
    type: oci:identity:compartment:id
    required: true
    visibile: true
